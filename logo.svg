<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ping" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#sky)" stroke="#334155" stroke-width="4"/>

  <!-- Radar rings -->
  <circle cx="256" cy="320" r="60" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="320" r="110" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.35"/>
  <circle cx="256" cy="320" r="160" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.2"/>

  <!-- Notification ping arcs -->
  <path d="M 200 280 A 70 70 0 0 1 312 280" fill="none" stroke="url(#ping)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M 180 260 A 95 95 0 0 1 332 260" fill="none" stroke="url(#ping)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 160 240 A 120 120 0 0 1 352 240" fill="none" stroke="url(#ping)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Airplane -->
  <g transform="translate(256, 200) rotate(-30)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="60" ry="10" fill="url(#plane)"/>
    <!-- Wings -->
    <path d="M -10 0 L -25 -45 L 10 -35 L 5 0 Z" fill="url(#plane)" opacity="0.9"/>
    <path d="M -10 0 L -25 45 L 10 35 L 5 0 Z" fill="url(#plane)" opacity="0.9"/>
    <!-- Tail -->
    <path d="M -55 0 L -70 -20 L -45 -15 Z" fill="url(#plane)" opacity="0.85"/>
    <path d="M -55 0 L -70 20 L -45 15 Z" fill="url(#plane)" opacity="0.85"/>
    <!-- Nose highlight -->
    <ellipse cx="50" cy="0" rx="12" ry="7" fill="#93c5fd" opacity="0.5"/>
  </g>

  <!-- Location pin dot -->
  <circle cx="256" cy="320" r="6" fill="url(#ping)"/>
  <circle cx="256" cy="320" r="3" fill="#fff"/>
</svg>
